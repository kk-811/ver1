<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭用ダッシュボード</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM 17 (Legacy Support) -->
  <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            secondary: '#64748b',
          }
        }
      }
    }
  </script>
  <style>
    /* 1. iOS 12.5.7 / Safari 12 Compatibility Fixes */
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100%;
      /* Safari 12 viewport fix */
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow: hidden;
      position: fixed;
    }
    
    #root {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* 2. Flexbox Gap Polyfill (Safari < 14.1) */
    /* This polyfill ensures spacing between flex items in older Safari versions */
    @supports not (gap: 1rem) {
      .flex.gap-1 > * + * { margin-left: 0.25rem; }
      .flex.gap-2 > * + * { margin-left: 0.5rem; }
      .flex.gap-3 > * + * { margin-left: 0.75rem; }
      .flex.gap-4 > * + * { margin-left: 1rem; }
      .flex.gap-6 > * + * { margin-left: 1.5rem; }
      
      .flex-col.gap-1 > * + * { margin-top: 0.25rem; margin-left: 0 !important; }
      .flex-col.gap-2 > * + * { margin-top: 0.5rem; margin-left: 0 !important; }
      .flex-col.gap-3 > * + * { margin-top: 0.75rem; margin-left: 0 !important; }
      .flex-col.gap-4 > * + * { margin-top: 1rem; margin-left: 0 !important; }
      .flex-col.gap-6 > * + * { margin-top: 1.5rem; margin-left: 0 !important; }

      /* Grid Gap (Safari 12 usually supports grid-gap, but let's be safe) */
      .grid.gap-1 { grid-gap: 0.25rem; }
      .grid.gap-2 { grid-gap: 0.5rem; }
      .grid.gap-3 { grid-gap: 0.75rem; }
      .grid.gap-4 { grid-gap: 1rem; }
      .grid.gap-6 { grid-gap: 1.5rem; }
    }

    /* 3. Backdrop Filter Fallback (Safari < 13) */
    @supports not (backdrop-filter: blur(1px)) {
      .backdrop-blur-md, 
      .backdrop-blur-xl,
      .backdrop-blur-2xl {
        background-color: rgba(255, 255, 255, 0.98) !important;
      }
    }

    /* 4. Performance & Scroll */
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* 4. Utility for better Safari 12 rendering */
    .safari-12-fix {
      display: block !important;
      width: 100%;
    }
    button, a, [role="button"] {
      cursor: pointer !important;
    }
  </style>
</head>

<body
  class="bg-[#F8FAFC] text-slate-800 font-sans antialiased selection:bg-blue-200">
  <div id="root"></div>

  <script type="text/babel" data-presets="es2015,react">
    const { useState, useEffect } = React;

    // ==========================================
    // 1. Clock Widget
    // ==========================================
    const ClockWidget = () => {
      const [time, setTime] = useState(new Date());
      const [showSeconds, setShowSeconds] = useState(false);

      useEffect(() => {
        const timer = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const getFormattedDate = () => {
        const days = ['日', '月', '火', '水', '木', '金', '土'];
        const m = time.getMonth() + 1;
        const d = time.getDate();
        const day = days[time.getDay()];
        return `${m}月${d}日 (${day})`;
      };

      const getFormattedTime = () => {
        const h = time.getHours().toString().padStart(2, '0');
        const m = time.getMinutes().toString().padStart(2, '0');
        const s = time.getSeconds().toString().padStart(2, '0');
        return { h, m, s };
      };

      const { h, m, s } = getFormattedTime();

      return (
        <div 
          onClick={() => setShowSeconds(!showSeconds)}
          className="bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-3xl p-4 md:p-5 text-white shadow-lg h-full flex flex-col justify-center items-center hover:shadow-xl transition-all duration-300 relative overflow-hidden group cursor-pointer"
        >
          <div className="relative z-10 flex flex-col items-center">
            <p className="text-[10px] md:text-xs font-medium opacity-90 tracking-widest bg-white/20 px-3 py-0.5 rounded-full mb-1 shadow-sm backdrop-blur-sm">
              {getFormattedDate()}
            </p>
            <div className={`font-black tabular-nums tracking-tighter drop-shadow-md flex items-center ${showSeconds ? 'text-3xl lg:text-4xl' : 'text-4xl lg:text-5xl'}`}>
              <span>{h}</span>
              <span className="opacity-80 pb-1 animate-pulse mx-1">:</span>
              <span>{m}</span>
              {showSeconds && (
                <>
                  <span className="opacity-80 pb-1 mx-1">:</span>
                  <span className="text-2xl lg:text-3xl opacity-90 mt-1">{s}</span>
                </>
              )}
            </div>
          </div>
          <div className="absolute -bottom-6 -right-6 text-[80px] opacity-10 pointer-events-none select-none group-hover:rotate-12 transition-transform duration-700">
            🕒
          </div>
        </div>
      );
    };

    // ==========================================
    // 2. Weather Widget (Wide, Hourly forecast)
    // ==========================================
    const WeatherWidget = () => {
      const [weather, setWeather] = useState(null);
      const [loading, setLoading] = useState(true);

      const apiUrl = 'https://api.open-meteo.com/v1/forecast?latitude=43.1907&longitude=141.0023&daily=weathercode,temperature_2m_max,temperature_2m_min&hourly=temperature_2m,precipitation_probability,weathercode&current_weather=true&timezone=Asia%2FTokyo';

      const getWeatherCondition = (code) => {
        if (code === 0) return { text: '快晴', icon: '☀️' };
        if (code === 1 || code === 2 || code === 3) return { text: '晴/曇', icon: '🌤️' };
        if (code === 45 || code === 48) return { text: '霧', icon: '🌫️' };
        if (code >= 51 && code <= 55) return { text: '霧雨', icon: '🌦️' };
        if (code >= 61 && code <= 65) return { text: '雨', icon: '☔' };
        if (code >= 71 && code <= 77) return { text: '雪', icon: '⛄' };
        if (code >= 80 && code <= 82) return { text: 'にわか雨', icon: '☔' };
        if (code >= 85 && code <= 86) return { text: '雪雨', icon: '⛄' };
        if (code >= 95) return { text: '雷雨', icon: '⚡' };
        return { text: '不明', icon: '☁️' };
      };

      useEffect(() => {
        fetch(apiUrl)
          .then(res => res.json())
          .then(data => {
            if (data && data.daily && data.hourly && data.current_weather) {
              const currentCode = data.current_weather.weathercode;
              const condition = getWeatherCondition(currentCode);

              const now = new Date();
              const hourlyTimes = data.hourly.time;
              
              const yyyy = now.getFullYear();
              const mm = String(now.getMonth() + 1).padStart(2, '0');
              const dd = String(now.getDate()).padStart(2, '0');
              const localTodayStr = `${yyyy}-${mm}-${dd}`;

              const tomorrow = new Date(now);
              tomorrow.setDate(tomorrow.getDate() + 1);
              const tmYyyy = tomorrow.getFullYear();
              const tmMm = String(tomorrow.getMonth() + 1).padStart(2, '0');
              const tmDd = String(tomorrow.getDate()).padStart(2, '0');
              const localTomorrowStr = `${tmYyyy}-${tmMm}-${tmDd}`;
              
              const combinedForecast = [];
              
              for (let i = 0; i < hourlyTimes.length; i++) {
                 const t = new Date(hourlyTimes[i]);
                 const tDateStr = hourlyTimes[i].split('T')[0];
                 if (t < new Date(now.getTime() - 3600000)) continue; // Show from 1 hour ago
                 
                 const hourItem = {
                     time: `${t.getHours()}時`,
                     dateLabel: tDateStr === localTodayStr ? '今日' : '明日',
                     temp: Math.round(data.hourly.temperature_2m[i]),
                     pop: data.hourly.precipitation_probability[i] || 0,
                     icon: getWeatherCondition(data.hourly.weathercode[i]).icon,
                     isPast: t < now
                 };
                 
                 if (tDateStr === localTodayStr || tDateStr === localTomorrowStr) {
                    combinedForecast.push(hourItem);
                 }
                 if (combinedForecast.length >= 24) break; 
              }

              setWeather({
                conditionText: condition.text,
                icon: condition.icon,
                high: Math.round(data.daily.temperature_2m_max[0]),
                low: Math.round(data.daily.temperature_2m_min[0]),
                currentTemp: Math.round(data.current_weather.temperature),
                hourly: combinedForecast
              });
            }
            setLoading(false);
          })
          .catch(err => {
            console.error(err);
            setLoading(false);
          });
      }, []);

      return (
        <div className="bg-gradient-to-br from-blue-400 to-cyan-500 rounded-3xl p-4 text-white shadow-lg h-full flex flex-row hover:shadow-xl transition-all duration-300 relative overflow-hidden gap-4 items-center">
          
          <div className="flex flex-col justify-center shrink-0 relative z-10 w-24 md:w-32 border-r border-white/20 pr-4 h-full">
            <div className="flex flex-col items-center">
              <span className="text-3xl lg:text-4xl drop-shadow-md mb-1">{loading ? '☁️' : weather?.icon}</span>
              <div className="text-2xl lg:text-3xl font-black tabular-nums">{loading ? '--' : weather?.currentTemp}°</div>
              <p className="text-[10px] font-bold opacity-80">{weather?.conditionText}</p>
            </div>
          </div>

          <div className="flex-1 flex gap-3 overflow-x-auto hide-scrollbar relative z-10 py-1 items-center">
            {loading ? (
              <div className="flex gap-3">
                {[1,2,3,4,5,6].map(i => <div key={i} className="w-16 h-20 bg-white/10 rounded-2xl animate-pulse"></div>)}
              </div>
            ) : (
              weather?.hourly?.map((h, i) => (
                <div key={i} className={`flex flex-col items-center justify-center min-w-[55px] md:min-w-[65px] ${h.isPast ? 'bg-white/5 opacity-40' : 'bg-white/10 hover:bg-white/20'} transition-colors cursor-default rounded-2xl p-2 shrink-0 backdrop-blur-sm border border-white/5`}>
                  <span className="text-[8px] opacity-70 font-bold mb-0.5">{h.dateLabel}</span>
                  <span className="text-[10px] opacity-90 font-black mb-1 leading-none">{h.time}</span>
                  <span className="text-xl mb-1 drop-shadow-sm">{h.icon}</span>
                  <span className="font-bold text-sm leading-none">{h.temp}°</span>
                  <div className="flex items-center gap-0.5 mt-1 bg-blue-900/20 px-1 py-0.5 rounded-md">
                    <span className="text-[8px] text-blue-100 font-bold">{h.pop}%</span>
                  </div>
                </div>
              ))
            )}
          </div>

          <div className="absolute -bottom-6 -right-6 text-[120px] opacity-5 pointer-events-none select-none mix-blend-overlay">
            {loading ? '☁️' : weather?.icon}
          </div>
        </div>
      );
    };

    // ==========================================
    // 3. エアコン（仮）プレースホルダー
    // ==========================================
    const AirconditionerWidget = () => {
      return (
        <div className="bg-white rounded-3xl p-4 shadow-sm border border-slate-100 h-full flex flex-col hover:border-sky-200 transition-colors">
          <h2 className="text-sm font-bold text-slate-700 mb-2 flex items-center gap-1.5 px-1">
            <span className="text-sky-500">❄️</span> エアコン（仮）
          </h2>
          <div className="flex-1 flex flex-col items-center justify-center gap-3 text-slate-400">
            <div className="text-4xl opacity-30">🌡️</div>
            <p className="text-xs font-bold text-center">今後開発予定</p>
            <p className="text-[10px] text-center opacity-70">エアコン制御・温度管理<br/>機能をここに追加します</p>
          </div>
        </div>
      );
    };

    // ==========================================
    // 4. JR Transit Timetable (JR Asari)
    // ==========================================
    const TrainTimetable = () => {
      const url = "https://jrhokkaidonorikae.com/ekihatsu/ekihatsu.php?node=%E6%9C%9D%E9%87%8C&linename=%EF%BC%AA%EF%BC%B2%E5%87%BD%E9%A4%A8%E6%9C%AC%E7%B7%9A&directionname=%E6%B1%9F%E5%88%A5%E3%83%BB%E5%B2%A9%E8%A6%8B%E6%B2%A2&next_node_id=4204&directionname2=%E5%B0%8F%E6%A8%BD%E3%83%BB%E5%80%B6%E7%9F%A5%E5%AE%89%7C4202";
      return (
        <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden h-full flex flex-col hover:border-blue-300 transition-colors">
          <div className="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center z-10">
            <h2 className="text-base font-bold text-slate-700 flex items-center gap-2">
              <span className="text-blue-500 text-lg">🚆</span> JR 朝里駅 時刻表
            </h2>
          </div>
          <div className="flex-1 relative bg-slate-50">
            {/* Placeholder message behind the iframe in case it fails */}
            <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400 text-xs p-6 text-center z-0 gap-2">
              <p>JR時刻表を表示しています。</p>
              <p className="opacity-70 text-[10px]">※表示されない場合は「Ignore X-Frame Headers」拡張機能をONにしてください。</p>
            </div>
            <iframe
              className="w-full h-full border-0 absolute inset-0 z-10"
              src={url}
              sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
            ></iframe>
          </div>
        </div>
      );
    };

    // ==========================================
    // 5. Bus Transit Timetable (Chuo Bus)
    // ==========================================
    const BusTimetable = () => {
      const stops = [
        { id: '00300196', name: '小樽自動車学校前' },
        { id: '00300393', name: '新光(高速バス)' }
      ];
      const [selectedStopId, setSelectedStopId] = useState(stops[0].id);
      
      const url = `https://transfer.navitime.biz/chuo-bus/pc/diagram/BusCourseSearch?busstopId=${selectedStopId}`;
      
      return (
        <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden h-full flex flex-col hover:border-orange-300 transition-colors">
          <div className="p-3 md:p-4 border-b border-slate-100 bg-slate-50/50 flex flex-col xl:flex-row justify-between xl:items-center gap-2 z-10">
            <h2 className="text-base font-bold text-slate-700 flex items-center gap-2 shrink-0">
              <span className="text-orange-500 text-lg">🚌</span> バス時刻表
            </h2>
            <select 
              value={selectedStopId} 
              onChange={(e) => setSelectedStopId(e.target.value)}
              className="text-xs md:text-sm border border-slate-300 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-orange-300 text-slate-700 bg-white"
            >
              {stops.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </div>
          <div className="flex-1 relative bg-slate-50">
            {/* Placeholder message */}
            <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400 text-xs p-6 text-center z-0 gap-2">
              <p>バス時刻表を表示しています。</p>
              <p className="opacity-70 text-[10px]">※表示されない場合は「Ignore X-Frame Headers」拡張機能をONにしてください。</p>
            </div>
            <iframe
              className="w-full h-full border-0 absolute inset-0 z-10"
              src={url}
              sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
            ></iframe>
          </div>
        </div>
      );
    };

    // ==========================================
    // 6. Calendar (TimeTree ログイン状態共有)
    // ==========================================
    const TimeTreeCalendar = () => {
      return (
        <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden h-full flex flex-col hover:border-blue-200 transition-colors">
          <div className="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center z-10">
            <h2 className="text-lg font-bold text-slate-700 flex items-center gap-2">
              <span className="text-blue-500 text-xl">📅</span> 家族カレンダー (TimeTree)
            </h2>
          </div>
          <div className="flex-1 bg-slate-50 relative min-h-[500px]">
            <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400 text-sm p-6 text-center z-0 gap-3">
              <div className="text-4xl opacity-50">🗓️</div>
              <p>TimeTreeカレンダーを表示しています。</p>
              <p className="text-xs opacity-70 border border-slate-200 p-2 rounded-lg mt-2 inline-block">
                表示エラーになる場合は、ブラウザの<br />「Ignore X-Frame Headers」拡張機能をONにしてください。
              </p>
            </div>
            <iframe
              className="w-full h-full relative z-10"
              src="https://timetreeapp.com/"
              frameBorder="0"
              allowFullScreen
            ></iframe>
          </div>
        </div>
      );
    };

    // ==========================================
    // Tabs & Layout
    // ==========================================

    // ==========================================
    // 8. TODO List (3 Columns)
    // ==========================================
    const TodoColumn = ({ title, todos, setTodos, inputName, setInputName }) => {
      const handleAdd = () => {
        if (!inputName.trim()) return;
        setTodos([...todos, {
          id: Date.now() + Math.random(),
          name: inputName,
          checked: false
        }]);
        setInputName('');
      };

      const handleToggle = (id) => {
        setTodos(todos.map(t => t.id === id ? { ...t, checked: !t.checked } : t));
      };

      const handleDelete = (id) => {
        setTodos(todos.filter(t => t.id !== id));
      };

      return (
        <div className="bg-white rounded-3xl border border-slate-100 shadow-[0_4px_24px_rgba(0,0,0,0.02)] flex flex-col h-full overflow-hidden hover:shadow-[0_8px_32px_rgba(0,0,0,0.04)] transition-all">
          <div className="p-4 border-b border-slate-100 text-center">
            <h3 className="text-xl font-black text-slate-800 tracking-tight">{title}</h3>
          </div>
          
          <div className="p-4 flex flex-col gap-4 flex-1 overflow-hidden">
            {/* 入力エリア */}
            <div className="flex bg-slate-100/80 rounded-2xl p-1.5 gap-1 shadow-inner border border-slate-200/50">
              <input
                type="text"
                placeholder="タスクを入力..."
                value={inputName}
                onChange={(e) => setInputName(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && handleAdd()}
                className="flex-1 bg-transparent px-3 py-2 text-slate-700 font-bold focus:outline-none placeholder-slate-400 text-sm"
              />
              <button
                onClick={handleAdd}
                disabled={!inputName.trim()}
                className="bg-gradient-to-br from-orange-400 to-coral-500 hover:from-orange-500 hover:to-coral-600 disabled:opacity-50 disabled:cursor-not-allowed text-white w-10 h-10 rounded-xl flex items-center justify-center font-bold text-xl transition-all shadow-sm hover:shadow-md shrink-0"
                style={{ backgroundImage: 'linear-gradient(to bottom right, #fb923c, #fb7185)' }}
              >
                ＋
              </button>
            </div>

            {/* リストエリア */}
            <div className="flex-1 overflow-y-auto hide-scrollbar flex flex-col gap-1 pr-1">
              {todos.length === 0 ? (
                <div className="h-full flex items-center justify-center text-slate-400 font-bold text-sm">
                  タスクはありません
                </div>
              ) : (
                todos.map(item => (
                  <div
                    key={item.id}
                    className={`flex items-center justify-between py-2 px-1 transition-all group border-b border-slate-50 last:border-0 ${item.checked ? 'opacity-50' : ''}`}
                  >
                    <div className="flex-1 min-w-0 pr-3">
                      <p className={`font-bold text-sm truncate ${item.checked ? 'text-slate-400 line-through decoration-2' : 'text-slate-700'}`}>
                        {item.name}
                      </p>
                    </div>

                    <div className="flex items-center gap-2 shrink-0">
                      <button
                        onClick={() => handleToggle(item.id)}
                        className={`w-6 h-6 rounded-[6px] border-2 flex items-center justify-center transition-all ${
                          item.checked 
                            ? 'bg-blue-500 border-blue-500 text-white' 
                            : 'bg-white border-slate-300 text-transparent hover:border-blue-400'
                        }`}
                      >
                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
                          <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                      </button>
                      
                      <button
                        onClick={() => handleDelete(item.id)}
                        className="w-7 h-7 rounded-full flex items-center justify-center text-slate-400 hover:bg-red-50 hover:text-red-500 transition-colors"
                      >
                        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                          <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                      </button>
                    </div>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      );
    };

    const TodoListTab = ({ todosFutari, setTodosFutari, todosBeni, setTodosBeni, todosKou, setTodosKou }) => {
      const [inputFutari, setInputFutari] = useState('');
      const [inputBeni, setInputBeni] = useState('');
      const [inputKou, setInputKou] = useState('');

      return (
         <div className="flex flex-col gap-6 h-full p-4 md:p-6 pb-28 md:pb-6 w-full max-w-[1200px] mx-auto overflow-hidden">
            <h2 className="text-2xl md:text-3xl font-black text-slate-800 tracking-tight text-center mt-2 shrink-0">TODO LIST</h2>
            
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 flex-1 min-h-0 pb-4 overflow-y-auto hide-scrollbar md:overflow-hidden">
               <TodoColumn title="ふたり" todos={todosFutari} setTodos={setTodosFutari} inputName={inputFutari} setInputName={setInputFutari} />
               <TodoColumn title="紅" todos={todosBeni} setTodos={setTodosBeni} inputName={inputBeni} setInputName={setInputBeni} />
               <TodoColumn title="康" todos={todosKou} setTodos={setTodosKou} inputName={inputKou} setInputName={setInputKou} />

    const WeeklyCalendarWidget = () => {
      const [shiftSchedule, setShiftSchedule] = useState(null);
      const [garbageSchedule, setGarbageSchedule] = useState(null);
      const [loading, setLoading] = useState(true);
      const [selectedDate, setSelectedDate] = useState(null);
      const [weekOffset, setWeekOffset] = useState(0); // 0 = 今週, 1 = 来週, -1 = 先週

      const getWeekDates = (offset) => {
        const today = new Date();
        const dayOfWeek = today.getDay(); // 0 is Sunday
        const sun = new Date(today);
        sun.setDate(today.getDate() - dayOfWeek + offset * 7);
        
        const dates = [];
        for (let i = 0; i < 7; i++) {
            const d = new Date(sun);
            d.setDate(sun.getDate() + i);
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            dates.push({
                dateStr: `${yyyy}-${mm}-${dd}`,
                displayStr: `${d.getMonth() + 1}/${d.getDate()}`
            });
        }
        return dates;
      };

      const weekDates = getWeekDates(weekOffset);

      // フォールバック: 8秒後に強制的にローディング解除
      useEffect(() => {
        const timer = setTimeout(() => setLoading(false), 8000);
        return () => clearTimeout(timer);
      }, []);

      // シフトデータ取得
      useEffect(() => {
        const SHIFT_SHEET_ID = '1wGX8J7vIkjJq5Xdxf8ulUXpFGhvbrHV6';
        const callbackName = '__shiftCallback_' + Math.floor(Math.random() * 1000000);
        
        window[callbackName] = (response) => {
             try {
                 if (!response || !response.table || !response.table.rows) return;
                 const rows = response.table.rows;
                 const parsedData = {};
                 rows.forEach(row => {
                    if (!row.c || !row.c[0]) return;
                    let dateStr = row.c[0].f || '';
                    if (!dateStr) return;
                    // フォーマットが YYYY-MM-DD か YYYY/MM/DD かを正規化
                    dateStr = dateStr.replace(/\//g, '-');
                    
                    const getVal = (idx) => (row.c[idx] && typeof row.c[idx].v !== 'undefined') ? String(row.c[idx].v) : '';
                    parsedData[dateStr] = {
                       M: getVal(2),
                       S: getVal(3),
                       O: getVal(4),
                       C: getVal(5)
                    };
                 });
                 setShiftSchedule(parsedData);
             } catch (err) {
                 console.error('Shift data parsing error:', err);
             } finally {
                 setLoading(false);
                 delete window[callbackName];
             }
        };

        const script = document.createElement('script');
        script.src = `https://docs.google.com/spreadsheets/d/${SHIFT_SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${callbackName}`;
        script.onerror = () => { setLoading(false); delete window[callbackName]; };
        document.body.appendChild(script);
        return () => { if (document.body.contains(script)) document.body.removeChild(script); };
      }, []);

      // ごみ収集データ取得（別コールバックで取得）
      useEffect(() => {
        const GARBAGE_SHEET_ID = '1mHHL_1mzgg70Rxu6XhdzsruRAz9UN4MyvP2Dnadiy70';
        const callbackName = '__garbageCallback_' + Math.floor(Math.random() * 1000000);

        window[callbackName] = (response) => {
          try {
            if (!response || !response.table || !response.table.rows) return;
            const rows = response.table.rows;
            const data = {};
            rows.forEach(row => {
              if (!row.c || !row.c[0]) return;
              const raw = row.c[0].f || row.c[0].v;
              if (!raw) return;
              // "2026/01/05" → "2026-01-05"
              const dateKey = String(raw).split(' ')[0].replace(/\//g, '-');
              const garbageType = (row.c[1] && row.c[1].v) ? String(row.c[1].v) : '';
              if (dateKey && garbageType) data[dateKey] = garbageType;
            });
            setGarbageSchedule(data);
          } catch (err) {
            console.error('Garbage data parsing error:', err);
          } finally {
            delete window[callbackName];
          }
        };

        const script = document.createElement('script');
        script.src = `https://docs.google.com/spreadsheets/d/${GARBAGE_SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${callbackName}&tq=select+A,B`;
        script.onerror = () => { delete window[callbackName]; };
        document.body.appendChild(script);
        return () => { if (document.body.contains(script)) document.body.removeChild(script); };
      }, []);

      const persons = [
        { id: 'beni', name: '紅衣', match: '津田' },
        { id: 'kou', name: '康太', match: '河原' }
      ];

      const getRoleForPerson = (dailyData, matchStr) => {
         if (!dailyData) return null;
         if (dailyData.M.includes(matchStr)) return { text: 'メイン', color: 'bg-red-100 text-red-700 border-red-200' };
         if (dailyData.S.includes(matchStr)) return { text: 'サブ', color: 'bg-blue-100 text-blue-700 border-blue-200' };
         if (dailyData.O.includes(matchStr)) return { text: 'オペ', color: 'bg-orange-100 text-orange-700 border-orange-200' };
         if (dailyData.C.includes(matchStr)) return { text: 'センター', color: 'bg-purple-100 text-purple-700 border-purple-200' };
         return null;
      };

      // ごみ種別ごとの色
      const getGarbageStyle = (type) => {
        if (!type) return null;
        const t = type.trim();
        // 可燃: 明るい黄色, 不燃: 青, プラ: 明るめ緑, 紙類: 暗め緑
        if (t.includes('可燃') || t.includes('燃える')) return 'bg-yellow-300 text-yellow-900 border-yellow-400 shadow-[0_0_10px_rgba(253,224,71,0.5)]';
        if (t.includes('不燃') || t.includes('燃えない')) return 'bg-blue-500 text-white border-blue-600 shadow-sm';
        if (t.includes('プラ')) return 'bg-green-400 text-green-900 border-green-500 shadow-sm';
        if (t.includes('資源') || t.includes('缶') || t.includes('瓶')) return 'bg-cyan-100 text-cyan-700 border-cyan-200';
        if (t.includes('段ボール') || t.includes('古紙') || t.includes('紙')) return 'bg-emerald-800 text-white border-emerald-900 shadow-md';
        if (t.includes('粗大')) return 'bg-purple-100 text-purple-700 border-purple-200';
        return 'bg-teal-100 text-teal-700 border-teal-200';
      };

      const daysLabels = ['日', '月', '火', '水', '木', '金', '土'];
      const weekLabel = weekOffset === 0 ? '今週' : weekOffset === 1 ? '来週' : weekOffset === -1 ? '先週' : `${weekOffset > 0 ? '+' : ''}${weekOffset}週`;

      return (
        <div className="bg-white rounded-3xl p-4 lg:p-5 shadow-sm border border-slate-100 h-full flex flex-col hover:border-blue-200 transition-colors relative">
           {/* ヘッダー */}
           <div className="flex items-center justify-between mb-3 px-1 shrink-0">
             <h2 className="text-sm lg:text-base font-bold text-slate-700 flex items-center gap-2">
               <span className="text-blue-500">📅</span> 週間カレンダー
             </h2>
             <div className="flex items-center gap-2">
               <button onClick={() => setWeekOffset(w => w - 1)} className="w-7 h-7 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-600 font-bold transition-colors text-sm">‹</button>
               <span className={`text-[11px] font-bold px-3 py-1 rounded-full border ${ weekOffset === 0 ? 'bg-blue-50 text-blue-600 border-blue-200' : 'bg-slate-100 text-slate-500 border-slate-200'}`}>{weekLabel}　{weekDates[0].displayStr} - {weekDates[6].displayStr}</span>
               <button onClick={() => setWeekOffset(w => w + 1)} className="w-7 h-7 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-600 font-bold transition-colors text-sm">›</button>
               {weekOffset !== 0 && <button onClick={() => setWeekOffset(0)} className="text-[10px] text-blue-500 hover:text-blue-700 font-bold transition-colors">今週へ</button>}
             </div>
           </div>
           
           <div className="flex-1 overflow-x-auto overflow-y-auto hide-scrollbar bg-slate-50/50 rounded-2xl border border-slate-100 p-2 lg:p-3">
             {loading ? (
               <div className="flex items-center justify-center h-full text-slate-400 text-sm animate-pulse">読み込み中...</div>
             ) : (
               <div className="w-full min-w-[420px]">
                 <table className="w-full text-center border-collapse">
                   <thead>
                     <tr>
                       <th className="p-2 border-b-2 border-slate-200 w-12 text-left text-[10px] font-bold text-slate-400 pl-2">行</th>
                       {weekDates.map((d, i) => {
                          const localToday = new Date();
                          const todayStr = `${localToday.getFullYear()}-${String(localToday.getMonth()+1).padStart(2,'0')}-${String(localToday.getDate()).padStart(2,'0')}`;
                          const isToday = d.dateStr === todayStr;
                          const isWeekend = i === 0 || i === 6;
                          return (
                              <th 
                                key={d.dateStr} 
                                onClick={() => setSelectedDate(d.dateStr)}
                                className={`p-2 border-b-2 border-slate-200 cursor-pointer hover:bg-slate-100 transition-colors ${ isToday ? 'bg-blue-100/60 rounded-t-xl border-blue-300' : ''}`}
                                title="クリックで詳細を表示"
                              >
                                <div className={`text-xs font-bold ${ isToday ? 'text-blue-700' : isWeekend ? 'text-red-400' : 'text-slate-600'}`}>{d.displayStr}</div>
                                <div className={`text-[9px] mt-0.5 ${ isToday ? 'text-blue-400 font-bold' : isWeekend ? 'text-red-300' : 'text-slate-400'}`}>({daysLabels[i]})</div>
                              </th>
                          )
                       })}
                     </tr>
                   </thead>
                   <tbody>
                     {/* シフト行 */}
                     {persons.map(person => (
                       <tr key={person.id} className="hover:bg-white/80 transition-colors">
                         <td className="py-2 px-2 text-xs font-black text-slate-600 border-r border-slate-200 text-left whitespace-nowrap">{person.name}</td>
                         {weekDates.map((d, i) => {
                            const dailyData = shiftSchedule && shiftSchedule[d.dateStr];
                            const role = getRoleForPerson(dailyData, person.match);
                            const localToday = new Date();
                            const todayStr = `${localToday.getFullYear()}-${String(localToday.getMonth()+1).padStart(2,'0')}-${String(localToday.getDate()).padStart(2,'0')}`;
                            const isToday = d.dateStr === todayStr;
                            return (
                              <td key={d.dateStr} className={`py-2 px-1 ${ isToday ? 'bg-blue-50/30' : ''}`}>
                                 {role ? (
                                    <div className={`text-[10px] lg:text-xs font-bold px-2 py-1 rounded-lg border ${role.color} whitespace-nowrap shadow-sm mx-auto inline-block`}>
                                       {role.text}
                                    </div>
                                 ) : (
                                    <div className="text-slate-200 text-lg">-</div>
                                 )}
                              </td>
                            );
                         })}
                       </tr>
                     ))}
                     {/* ごみ行 */}
                     <tr className="hover:bg-white/80 transition-colors border-t-2 border-slate-200">
                       <td className="py-2 px-2 text-xs font-black text-green-700 border-r border-slate-200 text-left whitespace-nowrap flex items-center gap-1">♻️ごみ</td>
                       {weekDates.map((d, i) => {
                          const gType = garbageSchedule && garbageSchedule[d.dateStr];
                          const localToday = new Date();
                          const todayStr = `${localToday.getFullYear()}-${String(localToday.getMonth()+1).padStart(2,'0')}-${String(localToday.getDate()).padStart(2,'0')}`;
                          const isToday = d.dateStr === todayStr;
                          const style = getGarbageStyle(gType);
                          return (
                            <td key={d.dateStr} className={`py-2 px-1 ${ isToday ? 'bg-blue-50/30' : ''}`}>
                              {gType ? (
                                <div className={`text-[10px] font-bold px-1.5 py-1 rounded-lg border ${style} whitespace-nowrap shadow-sm mx-auto inline-block`}>
                                  {gType}
                                </div>
                              ) : (
                                <div className="text-slate-200 text-sm">-</div>
                              )}
                            </td>
                          );
                       })}
                     </tr>
                   </tbody>
                 </table>
               </div>
             )}
           </div>

           {/* 日付詳細ポップアップ */}
           {selectedDate && (
             <div className="absolute inset-0 z-20 bg-slate-800/20 backdrop-blur-sm rounded-3xl flex items-center justify-center p-4" onClick={() => setSelectedDate(null)}>
                <div className="bg-white rounded-2xl p-5 shadow-xl border border-slate-100 w-full max-w-[280px]" onClick={e => e.stopPropagation()}>
                   <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-2">
                     <h3 className="font-bold text-slate-700 text-sm">🗓️ {selectedDate.slice(5).replace('-','/')} の詳細</h3>
                     <button onClick={() => setSelectedDate(null)} className="text-slate-400 hover:text-slate-600 font-bold">✕</button>
                   </div>
                   <div className="flex flex-col gap-3 text-xs">
                     <div className="flex justify-between items-center"><span className="bg-red-100 text-red-700 px-2 py-0.5 rounded font-bold w-16 text-center">メイン</span><span className="font-medium text-slate-700 truncate ml-2">{(shiftSchedule && shiftSchedule[selectedDate]?.M) || '-'}</span></div>
                     <div className="flex justify-between items-center"><span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-bold w-16 text-center">サブ</span><span className="font-medium text-slate-700 truncate ml-2">{(shiftSchedule && shiftSchedule[selectedDate]?.S) || '-'}</span></div>
                     <div className="flex justify-between items-center"><span className="bg-orange-100 text-orange-700 px-2 py-0.5 rounded font-bold w-16 text-center">オペ</span><span className="font-medium text-slate-700 truncate ml-2">{(shiftSchedule && shiftSchedule[selectedDate]?.O) || '-'}</span></div>
                     <div className="flex justify-between items-center"><span className="bg-purple-100 text-purple-700 px-2 py-0.5 rounded font-bold w-16 text-center">センター</span><span className="font-medium text-slate-700 truncate ml-2">{(shiftSchedule && shiftSchedule[selectedDate]?.C) || '-'}</span></div>
                     {garbageSchedule && garbageSchedule[selectedDate] && (
                       <div className="flex justify-between items-center border-t border-slate-100 pt-2">
                         <span className="bg-green-100 text-green-700 px-2 py-0.5 rounded font-bold w-16 text-center">ごみ</span>
                         <span className="font-medium text-slate-700 truncate ml-2">{garbageSchedule[selectedDate]}</span>
                       </div>
                     )}
                   </div>
                </div>
             </div>
           )}
        </div>
      );
    };

    // ==========================================
    // 7. Shopping List (Tabs & Flyers)
    // ==========================================
    const ShoppingListTab = () => {
      const [categories, setCategories] = useState(['全般']);
      const [activeCategory, setActiveCategory] = useState('全般');
      const [shoppingItems, setShoppingItems] = useState([
        { id: 1, name: '牛乳 1L', qty: '1本', checked: false, category: '全般' },

      const [newItemQty, setNewItemQty] = useState('');
      const [newCategoryName, setNewCategoryName] = useState('');
      const [catDate, setCatDate] = useState(new Date().toISOString().split('T')[0]);
      const [showAddCategory, setShowAddCategory] = useState(false);
      const [selectedFlyer, setSelectedFlyer] = useState('hokuren');
      
      const [contextMenu, setContextMenu] = useState(null); // { x, y, item }

      const flyers = [
        { id: 'hokuren', name: 'ホクレン' },
        { id: 'trial', name: 'トライアル' },
        { id: 'satsudora', name: 'サツドラ' },
        { id: 'lucky', name: 'ラッキー' }
      ];

      const handleAddItem = () => {
        if (!newItemName.trim()) return;
        setShoppingItems([...shoppingItems, {
          id: Date.now(),
          name: newItemName,
          qty: newItemQty,
          checked: false,
          category: activeCategory
        }]);
        setNewItemName('');
        setNewItemQty('');
      };

      const handleAddCategory = () => {
        if (!newCategoryName.trim() || categories.includes(newCategoryName)) return;
        setCategories([...categories, newCategoryName]);
        setActiveCategory(newCategoryName);
        setNewCategoryName('');
        setShowAddCategory(false);
      };

      const handleInsertDate = () => {
        const dateStr = catDate.replace(/-/g, '/');
        setNewCategoryName(dateStr);
      };

      const handleToggleCheck = (id) => {
        setShoppingItems(shoppingItems.map(item =>
          item.id === id ? { ...item, checked: !item.checked } : item
        ));
      };

      const handleDeleteItem = (id) => {
        setShoppingItems(shoppingItems.filter(item => item.id !== id));
      };

      const handleCopyItem = (item, targetCategory) => {
        setShoppingItems([...shoppingItems, {
          ...item,
          id: Date.now() + Math.random(),
          category: targetCategory,
          checked: false
        }]);
        setContextMenu(null);
      };

      const onRightClick = (e, item) => {
        e.preventDefault();
        setContextMenu({
          x: e.clientX,
          y: e.clientY,
          item: item
        });
      };

      let touchTimer;
      const onTouchStart = (e, item) => {
        touchTimer = setTimeout(() => {
          const touch = e.touches[0];
          setContextMenu({ x: touch.clientX, y: touch.clientY, item: item });

    const NextTransitWidget = () => {
      const [time, setTime] = useState(new Date());

      useEffect(() => {
        const timer = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      // ダミー時刻表（※実際のダイヤの数件をサンプリング）
      const jrSchedule = [
        { hour: 6, min: 14, dest: '小樽' }, { hour: 6, min: 45, dest: '札幌' },
        { hour: 7, min: 10, dest: '小樽' }, { hour: 7, min: 30, dest: '札幌' },
        { hour: 8, min: 5, dest: '小樽' }, { hour: 8, min: 20, dest: '新千歳空港' },
        { hour: 9, min: 0, dest: '小樽' }, { hour: 9, min: 15, dest: '江別' },
        // 直近のテスト時間が表示されるように動的にダミーデータ追加
        { hour: time.getHours(), min: time.getMinutes() + 15, dest: 'ﾃｽﾄ行 ❶' },
        { hour: time.getHours(), min: time.getMinutes() + 45, dest: 'ﾃｽﾄ行 ❷' },
        { hour: time.getHours() + 1, min: 10, dest: 'ﾃｽﾄ行 ❸' },
      ];

      const busSchedule = [
        { hour: 6, min: 25, dest: '小樽駅前' }, { hour: 7, min: 15, dest: '小樽駅前' },
        { hour: 8, min: 0, dest: '小樽駅前' }, { hour: 8, min: 40, dest: '小樽駅前' },
        // 直近のテスト時間が表示されるように動的にダミーデータ追加
        { hour: time.getHours(), min: time.getMinutes() + 5, dest: 'ﾃｽﾄ行 ❶' },
        { hour: time.getHours(), min: time.getMinutes() + 30, dest: 'ﾃｽﾄ行 ❷' },
        { hour: time.getHours() + 1, min: 0, dest: 'ﾃｽﾄ行 ❸' },
      ];

      const getNextDepartures = (schedule) => {
         const nowMins = time.getHours() * 60 + time.getMinutes();
         return schedule
           .map(s => ({ ...s, totalMins: s.hour * 60 + s.min }))
           .filter(s => s.totalMins > nowMins)
           .sort((a, b) => a.totalMins - b.totalMins)
           .slice(0, 3);
      };

      const nextJr = getNextDepartures(jrSchedule);
      const nextBus = getNextDepartures(busSchedule);

      const formatMinDiff = (totalMins) => {
         const nowMins = time.getHours() * 60 + time.getMinutes();
         const diff = totalMins - nowMins;
         if (diff < 60) return `あと ${diff} 分`;
         const h = Math.floor(diff / 60);
         const m = diff % 60;
         return `あと ${h}時間${m}分`;
      };

      const renderSchedule = (title, icon, data, colorClass) => (
        <div className={`bg-white rounded-3xl p-5 shadow-sm border border-slate-100 h-full flex flex-col hover:border-${colorClass}-300 transition-colors`}>
            <h2 className={`text-base font-bold text-slate-700 flex items-center gap-2 mb-4 pb-2 border-b border-slate-100`}>
               <span className={`text-${colorClass}-500 text-xl`}>{icon}</span> {title}
            </h2>
            {data.length > 0 ? (
               <ul className="flex flex-col gap-3">
                 {data.map((d, i) => (
                   <li key={i} className={`flex justify-between items-center p-3 rounded-2xl transition-colors ${i === 0 ? `bg-${colorClass}-50 border border-${colorClass}-100` : 'bg-slate-50'}`}>
                     <div className="flex items-end gap-3">
                       <span className="text-2xl lg:text-3xl font-black tabular-nums tracking-tighter text-slate-800 leading-none">
                         {String(d.hour).padStart(2,'0')}:{String(d.min).padStart(2,'0')}
                       </span>
                       <span className="text-sm lg:text-base font-bold text-slate-500 mb-0.5">{d.dest}</span>
                     </div>
                     <div className={`font-black text-sm md:text-base ${i === 0 ? `text-${colorClass}-600` : 'text-slate-400'}`}>
                       {formatMinDiff(d.totalMins)}
                     </div>
                   </li>
                 ))}
               </ul>
            ) : (
               <p className="text-slate-400 text-sm text-center py-6">本日の運行は終了しました</p>
            )}
        </div>
      );

      return (
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-full p-4 md:p-6 pb-28 md:pb-6 w-full max-w-[1200px] mx-auto overflow-y-auto hide-scrollbar">
           {renderSchedule('JR 朝里駅 (次の発車)', '🚆', nextJr, 'blue')}
           {renderSchedule('自動車学校前 (次の発車)', '🚌', nextBus, 'orange')}
        </div>
      );
    };

    const TimetablesTab = () => {
      return (
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-full p-4 md:p-6 pb-28 md:pb-6 w-full max-w-[1600px] mx-auto overflow-y-auto hide-scrollbar">
           <div className="h-[1000px] bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden hover:shadow-md transition-shadow shrink-0">
             <TrainTimetable />
           </div>
           <div className="h-[1000px] bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden hover:shadow-md transition-shadow shrink-0">
             <BusTimetable />
           </div>
        </div>
      );
    };

    // ==========================================
    // 9. Document Management (文書管理)
    // ==========================================
    const DocumentManagementTab = () => {
      const SHEET_ID = '1fcmLO_2BixAdYuvncMosPQQLFavArXUgIW101fMIiSA';
      const GAS_URL = 'https://script.google.com/macros/s/AKfycbwub82-0Q6Ng7aRblX1RYdWmEP3ALKEXpXQKOjNCl0ddhZxjmnLqMm5_VPSl2VUMzk/exec';
      
      const [docs, setDocs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [viewMode, setViewMode] = useState('list'); // 'list', 'input', 'edit'
      const [searchQuery, setSearchQuery] = useState('');
      const [formData, setFormData] = useState({ No: '', 書類名: '', カテゴリ: 'その他', 保証期限: '', メモ: '' });
      const [status, setStatus] = useState({ type: '', msg: '' });

      const getNextNo = (currentDocs) => {
        if (!currentDocs || currentDocs.length === 0) return 1;
        const nos = currentDocs.map(d => parseInt(d.No)).filter(n => !isNaN(n));
        return nos.length > 0 ? Math.max(...nos) + 1 : 1;
      };

      const fetchData = () => {
        setLoading(true);
        const callbackName = 'cb_' + Date.now();
        window[callbackName] = (res) => {
          try {
            const rows = res.table.rows;
            const data = rows.map(r => ({
              No: r.c[0]?.v || '',
              書類名: r.c[1]?.v || '',
              登録日: r.c[2]?.f || r.c[2]?.v || '',
              カテゴリ: r.c[3]?.v || '',
              保証期限: r.c[4]?.f || r.c[4]?.v || '',
              メモ: r.c[5]?.v || ''
            }));
            setDocs(data);
          } catch (e) { console.error(e); }
          finally { setLoading(false); delete window[callbackName]; }
        };
        const script = document.createElement('script');
        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${callbackName}`;
        document.body.appendChild(script);
      };

      useEffect(() => { fetchData(); }, []);

      const handleSave = async (e) => {
        e.preventDefault();
        if (!formData.No || !formData.書類名) {
          alert('Noと書類名は必須です');
          return;
        }

        const isUpdate = viewMode === 'edit';
        
        // 重複チェック (新規登録時)
        if (!isUpdate && docs.some(d => d.No.toString() === formData.No.toString())) {
          alert(`エラー: No. ${formData.No} は既に登録されています`);
          return;
        }

        if (!confirm(`${isUpdate ? '更新' : '登録'}してもよろしいですか？`)) return;

        setStatus({ type: 'loading', msg: '保存中...' });
        
        try {
          const payload = {
            action: isUpdate ? 'update' : 'add',
            data: {
              ...formData,
              登録日: isUpdate ? undefined : new Date().toLocaleDateString('ja-JP')
            }
          };

          const res = await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
          });
          
          setStatus({ type: 'success', msg: '保存しました！' });
          setTimeout(() => {
            setStatus({ type: '', msg: '' });
            setFormData({ No: '', 書類名: '', カテゴリ: 'その他', 保証期限: '', メモ: '' });
            setViewMode('list');
            fetchData();
          }, 1500);
        } catch (err) {
          console.error(err);
          setStatus({ type: 'error', msg: '送信に失敗しました' });
        }
      };

      const startEdit = (doc) => {
        setFormData(doc);
        setViewMode('edit');
      };

      const filteredDocs = docs.filter(d => 
        d.No.toString().includes(searchQuery) || 
        d.書類名.toLowerCase().includes(searchQuery.toLowerCase()) ||
        d.メモ.toLowerCase().includes(searchQuery.toLowerCase())
      ).sort((a, b) => b.No - a.No);

      return (
        <div className="flex flex-col gap-4 h-full p-4 md:p-6 pb-32 md:pb-6 w-full max-w-[1200px] mx-auto overflow-hidden">
          <div className="flex justify-between items-center shrink-0">
            <h2 className="text-2xl md:text-3xl font-black text-slate-800 tracking-tight flex items-center gap-2">
              <span className="text-3xl">📄</span> 文書管理
            </h2>
            <div className="flex gap-2">
              <button 
                onClick={() => setViewMode('list')}
                className={`px-4 py-2 rounded-xl font-bold text-sm transition-all ${viewMode === 'list' ? 'bg-slate-800 text-white shadow-md' : 'bg-white text-slate-500 hover:bg-slate-50'}`}
              >
                一覧・検索
              </button>
              <button 
                onClick={() => { 
                  setViewMode('input'); 
                  setFormData({ No: getNextNo(docs), 書類名: '', カテゴリ: 'その他', 保証期限: '', メモ: '' }); 
                }}
                className={`px-4 py-2 rounded-xl font-bold text-sm transition-all ${viewMode === 'input' ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-500 hover:bg-slate-50'}`}
              >
                新規入力
              </button>
            </div>
          </div>

          <div className="flex-1 bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden flex flex-col relative">
            {status.msg && (
              <div className={`absolute top-4 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-2xl shadow-xl font-bold text-sm animate-in fade-in slide-in-from-top-4 ${status.type === 'success' ? 'bg-emerald-500 text-white' : status.type === 'error' ? 'bg-red-500 text-white' : 'bg-blue-500 text-white'}`}>
                {status.type === 'loading' && <span className="inline-block animate-spin mr-2">⏳</span>}
                {status.msg}
              </div>
            )}

            {viewMode === 'list' ? (
              <div className="flex flex-col h-full">
                <div className="p-4 border-b border-slate-100 bg-slate-50/50 flex gap-2">
                  <div className="relative flex-1">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                    <input 
                      type="text" 
                      placeholder="No、書類名、メモで検索..." 
                      className="w-full pl-10 pr-4 py-2.5 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium"
                      value={searchQuery}
                      onChange={e => setSearchQuery(e.target.value)}
                    />
                  </div>
                  <button onClick={fetchData} className="p-2.5 rounded-2xl bg-white border border-slate-200 hover:bg-slate-50 text-slate-500 transition-colors">
                    🔄
                  </button>
                </div>

                <div className="flex-1 overflow-y-auto overflow-x-auto hide-scrollbar">
                  {loading ? (
                    <div className="h-full flex items-center justify-center text-slate-400 font-bold animate-pulse">読み込み中...</div>
                  ) : filteredDocs.length === 0 ? (
                    <div className="h-full flex flex-col items-center justify-center text-slate-300 gap-2">
                      <span className="text-5xl">📁</span>
                      <p className="font-bold">書類が見つかりません</p>
                    </div>
                  ) : (
                    <table className="w-full text-left border-collapse min-w-[800px]">
                      <thead className="sticky top-0 bg-white/95 backdrop-blur-md z-10 shadow-sm">
                        <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                          <th className="px-4 py-3 w-16">No</th>
                          <th className="px-4 py-3 w-48">書類名</th>
                          <th className="px-4 py-3 w-24">カテゴリ</th>
                          <th className="px-4 py-3 w-28 text-center">保証期限</th>
                          <th className="px-4 py-3 w-40">メモ</th>
                          <th className="px-4 py-3 w-28 text-center">登録日</th>
                          <th className="px-4 py-3 w-20 sticky right-0 bg-white/95 backdrop-blur-md">操作</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-50">
                        {filteredDocs.map(doc => (
                          <tr key={doc.No} className="hover:bg-slate-50/80 transition-colors group">
                            <td className="px-4 py-4">
                              <span className="inline-block px-2 py-1 rounded-lg bg-slate-100 text-slate-700 font-black text-xs">#{doc.No}</span>
                            </td>
                            <td className="px-4 py-4">
                              <div className="font-bold text-slate-800 text-sm truncate max-w-[180px]" title={doc.書類名}>{doc.書類名}</div>
                            </td>
                            <td className="px-4 py-4">
                              <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded-md border inline-block ${
                                doc.カテゴリ === '保証書' ? 'bg-orange-50 text-orange-600 border-orange-100' :
                                doc.カテゴリ === '契約書' ? 'bg-blue-50 text-blue-600 border-blue-100' :
                                doc.カテゴリ === '医療' ? 'bg-rose-50 text-rose-600 border-rose-100' :
                                'bg-slate-50 text-slate-500 border-slate-100'
                              }`}>{doc.カテゴリ}</span>
                            </td>
                            <td className="px-4 py-4 text-center">
                              {doc.保証期限 ? (
                                <span className="text-[10px] text-red-500 font-bold bg-red-50 px-2 py-0.5 rounded-full">{doc.保証期限}</span>
                              ) : (
                                <span className="text-slate-200 text-xs">-</span>
                              )}
                            </td>
                            <td className="px-4 py-4">
                              <div className="text-[11px] text-slate-500 line-clamp-2 max-w-[150px]" title={doc.メモ}>{doc.メモ || '-'}</div>
                            </td>
                            <td className="px-4 py-4 text-center">
                              <span className="text-[10px] text-slate-400 font-medium">{doc.登録日}</span>
                            </td>
                            <td className="px-4 py-4 sticky right-0 bg-white/80 backdrop-blur-sm group-hover:bg-slate-100/80 transition-colors">
                              <button 
                                onClick={() => startEdit(doc)}
                                className="text-blue-500 hover:text-blue-700 font-bold text-xs bg-blue-50 px-3 py-1.5 rounded-lg transition-colors"
                              >
                                修正
                              </button>
                            </td>
                          </tr>

                    </table>

            ) : (

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">

                        required
                        disabled={viewMode === 'edit'}

                        value={formData.No}
                        onChange={e => setFormData({ ...formData, No: e.target.value })}
                      />
                    </div>
                    <div className="space-y-2">
                      <label className="text-xs font-black text-slate-500 flex items-center gap-1.5 ml-1">

                      <select 
                        className="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700"
                        value={formData.カテゴリ}
                        onChange={e => setFormData({ ...formData, カテゴリ: e.target.value })}
                      >
                        <option value="保証書">保証書</option>
                        <option value="契約書">契約書</option>
                        <option value="医療">医療</option>
                        <option value="その他">その他</option>
                      </select>
                    </div>

                  <div className="space-y-2">

                  </div>

                  <div className="space-y-2">
                    <label className="text-xs font-black text-slate-500 flex items-center gap-1.5 ml-1">
                      メモ (任意)
                    </label>
                    <textarea 
                      rows="3"
                      placeholder="保管場所詳細など..."
                      className="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold"
                      value={formData.メモ}
                      onChange={e => setFormData({ ...formData, メモ: e.target.value })}
                    />
                  </div>

                  <div className="pt-4 flex gap-4">
                    <button 
                      type="button"
                      onClick={() => setViewMode('list')}
                      className="flex-1 py-4 rounded-2xl bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold transition-all"
                    >
                      キャンセル
                    </button>
                    <button 
                      type="submit"
                      disabled={status.type === 'loading'}
                      className="flex-[2] py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-bold shadow-lg shadow-blue-200 transition-all disabled:opacity-50"
                    >
                      {viewMode === 'edit' ? '修正内容を保存' : '新しく登録する'}
                    </button>
                  </div>
                </form>
              </div>
            )}
            
            {/* テーブルが横に長い場合にスクロール可能であることを示すヒント */}
            {viewMode === 'list' && (
              <div className="bg-slate-100 text-[10px] text-slate-400 text-center py-1 md:hidden">
                ← 横にスクロールして全項目を表示 →
              </div>
            )}
          </div>
        </div>
      );
    };

    // 今日のTODOミニウィジェット（メインタブ用コンパクト装）
    const TodayTodoWidget = ({ todosFutari, setTodosFutari, todosBeni, setTodosBeni, todosKou, setTodosKou }) => {
      const allTodos = [
        ...todosFutari.filter(t => !t.checked).map(t => ({ ...t, label: 'ふたり', setter: setTodosFutari, all: todosFutari })),
        ...todosBeni.filter(t => !t.checked).map(t => ({ ...t, label: '紅', setter: setTodosBeni, all: todosBeni })),
        ...todosKou.filter(t => !t.checked).map(t => ({ ...t, label: '康', setter: setTodosKou, all: todosKou })),
      ].slice(0, 2);

      const handleToggle = (item) => {
        item.setter(item.all.map(t => t.id === item.id ? { ...t, checked: true } : t));
      };

      return (
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-3 flex flex-col gap-2 hover:shadow-md transition-all">
          <div className="flex items-center justify-between">
            <h3 className="text-xs font-black text-slate-600 flex items-center gap-1.5">
              <span>📝</span> 今日のTODO
            </h3>
            <span className="text-[10px] text-slate-400 font-medium">未完了 {todosFutari.filter(t=>!t.checked).length + todosBeni.filter(t=>!t.checked).length + todosKou.filter(t=>!t.checked).length} 件</span>
          </div>
          {allTodos.length === 0 ? (
            <p className="text-slate-400 text-xs font-bold text-center py-2">🎉 全部完了！</p>
          ) : (
            allTodos.map(item => (
              <div key={item.id} className="flex items-center gap-2 bg-slate-50 rounded-xl px-3 py-2">
                <button
                  onClick={() => handleToggle(item)}
                  className="w-5 h-5 rounded-[5px] border-2 border-slate-300 hover:border-blue-400 flex items-center justify-center text-transparent hover:text-blue-400 transition-all shrink-0"
                >
                  <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                  </svg>
                </button>
                <span className="text-xs font-bold text-slate-700 flex-1 truncate">{item.name}</span>
                <span className="text-[9px] font-bold text-slate-400 bg-slate-200 px-1.5 py-0.5 rounded-full shrink-0">{item.label}</span>
              </div>
            ))
          )}
        </div>
      );
    };

    const MainTab = ({ todosFutari, setTodosFutari, todosBeni, setTodosBeni, todosKou, setTodosKou }) => {
      return (
        <div className="flex flex-col gap-3 md:gap-4 h-full p-3 md:p-4 lg:p-6 pb-32 md:pb-6 w-full max-w-[1600px] mx-auto overflow-y-auto md:overflow-hidden hide-scrollbar">
          
          {/* ===== モバイル: 縦一列 / デスクトップ: 横並び ===== */}

          {/* 上段: 時計（スマホでは小さく） */}
          <div className="h-24 md:hidden shrink-0 transition-transform hover:-translate-y-1"><ClockWidget /></div>

          {/* 中段: 週間カレンダー（スマホでも全幅） */}
          <div className="h-[280px] md:hidden shrink-0 transition-transform hover:-translate-y-1">
            <WeeklyCalendarWidget />
          </div>

          {/* エアコン（スマホのみ） */}
          <div className="h-32 md:hidden shrink-0 transition-transform hover:-translate-y-1"><AirconditionerWidget /></div>

          {/* 天気（スマホのみ位置） */}
          <div className="h-44 md:hidden shrink-0 z-10 transition-transform hover:-translate-y-1">
            <WeatherWidget />
          </div>

          {/* === デスクトップレイアウト（md以上）=== */}
          <div className="hidden md:flex flex-col gap-4 flex-1 min-h-0">

            {/* 上段: 左列（時計＋エアコン仮） ＋ 右列（週間カレンダー） */}
            <div className="flex flex-col lg:flex-row gap-4 flex-1 min-h-0">

              {/* 左列: 時計 + エアコン（仮） */}
              <div className="flex flex-col gap-4 lg:w-[28%] xl:w-1/4 shrink-0 z-10 h-full">
                <div className="h-28 lg:h-32 shrink-0 transition-transform hover:-translate-y-1"><ClockWidget /></div>
                <div className="flex-1 min-h-[120px] transition-transform hover:-translate-y-1"><AirconditionerWidget /></div>
              </div>

              {/* 右列: 週間カレンダー */}
              <div className="flex-1 h-full min-h-0 overflow-hidden transition-transform hover:-translate-y-1">
                <WeeklyCalendarWidget />
              </div>

            </div>

            {/* 下段: 天気 */}
            <div className="h-44 lg:h-52 shrink-0 z-10 transition-transform hover:-translate-y-1">
              <WeatherWidget />
            </div>

          </div>

        </div>
      );
    };

    const AppLayout = ({ children, activeTab, setActiveTab }) => {
      const tabs = [
        { id: 'main', name: 'メイン', icon: '🏠' },
        { id: 'timetables', name: '時刻表', icon: '🚆' },
        { id: 'shopping', name: 'お買物', icon: '🛒' },
        { id: 'todo', name: 'TODO', icon: '📝' },
        { id: 'calendar', name: 'カレンダー', icon: '📅' },
        { id: 'settings', name: '設定', icon: '⚙️' },
        { id: 'test', name: 'テスト', icon: '🧪' },
        { id: 'documents', name: '文書管理', icon: '📄' },
      ];

      return (
        <div className="flex flex-col h-full bg-[#F8FAFC] w-full overflow-hidden font-sans">
          <header className="hidden md:flex bg-white/80 backdrop-blur-md shadow-sm border-b border-slate-200 px-8 py-4 justify-between items-center z-20 sticky top-0">
            <h1 className="text-2xl font-black text-slate-800 tracking-tight flex items-center gap-2">
              <span className="text-3xl">🎛️</span>
              Home<span className="text-blue-600">Dash</span>
            </h1>
            <div className="flex gap-2 p-1.5 rounded-2xl bg-slate-100/80 shadow-inner">
              {tabs.map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`px-6 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 flex items-center gap-2 ${activeTab === tab.id
                      ? 'bg-white text-blue-600 shadow-sm scale-105'
                      : 'bg-transparent text-slate-500 hover:text-slate-700 hover:bg-white/50'
                    }`}
                >
                  <span className="text-lg">{tab.icon}</span>{tab.name}
                </button>
              ))}
            </div>
          </header>

          <main className="flex-1 overflow-hidden relative">
            <div className="absolute inset-0 overflow-y-auto hide-scrollbar scroll-smooth">
              {children}
            </div>
          </main>

          <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl shadow-[0_-10px_40px_rgba(0,0,0,0.08)] border-t border-slate-100 z-50 px-6 py-2 pb-safe">
            <ul className="flex overflow-x-auto hide-scrollbar items-center gap-2 px-2">
              {tabs.map(tab => (
                <li key={tab.id}>
                  <button
                    onClick={() => setActiveTab(tab.id)}
                    className={`flex flex-col items-center justify-center p-2 rounded-xl transition-all duration-300 w-16 ${activeTab === tab.id
                        ? 'text-blue-600 -translate-y-2'
                        : 'text-slate-400 hover:text-slate-600'
                      }`}
                  >
                    <span className={`text-2xl mb-1 ${activeTab === tab.id ? 'scale-110 drop-shadow-md' : ''} transition-all`}>{tab.icon}</span>
                    <span className="text-[10px] font-bold">{tab.name}</span>
                    <div className={`h-1 w-1 bg-blue-600 rounded-full mt-1 absolute -bottom-2 transition-opacity duration-300 ${activeTab === tab.id ? 'opacity-100' : 'opacity-0'}`}></div>
                  </button>
                </li>
              ))}
            </ul>
          </nav>

          <style dangerouslySetInnerHTML={{
            __html: `
            .hide-scrollbar::-webkit-scrollbar { display: none; }
            .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
            .pb-safe { padding-bottom: max(env(safe-area-inset-bottom), 1rem); }
          `}} />
        </div>
      );
    };

    const App = () => {
      const [activeTab, setActiveTab] = useState('main');
      const [todosFutari, setTodosFutari] = useState([{id: 1, name: '家賃振り込み', checked: false}]);
      const [todosBeni, setTodosBeni] = useState([{id: 2, name: '美容室予約', checked: false}]);
      const [todosKou, setTodosKou] = useState([{id: 3, name: '書類提出', checked: true}]);

      // 5分ごとに自動更新 (300,000ms)
      useEffect(() => {
        const refreshInterval = setInterval(() => {
          console.log('--- 5-min Auto Refresh ---');
          window.location.reload();
        }, 5 * 60 * 1000);
        return () => clearInterval(refreshInterval);
      }, []);

      return (
        <AppLayout activeTab={activeTab} setActiveTab={setActiveTab}>
          {/* Main Tab View */}
          <div className={`transition-all duration-500 ${activeTab === 'main' ? 'opacity-100 z-10 flex flex-col h-full' : 'opacity-0 hidden'}`}>
            <MainTab todosFutari={todosFutari} setTodosFutari={setTodosFutari} todosBeni={todosBeni} setTodosBeni={setTodosBeni} todosKou={todosKou} setTodosKou={setTodosKou} />
          </div>

          {/* Timetables Tab View */}
          <div className={`transition-all duration-500 ${activeTab === 'timetables' ? 'opacity-100 z-10 flex flex-col h-full' : 'opacity-0 hidden'}`}>
            <TimetablesTab />
          </div>

          {/* Shopping List Tab View */}
          <div className={`transition-all duration-500 ${activeTab === 'shopping' ? 'opacity-100 z-10 flex flex-col h-full' : 'opacity-0 hidden'}`}>
            <ShoppingListTab />
          </div>

          {/* Document Management Tab View */}
          <div className={`transition-all duration-500 ${activeTab === 'documents' ? 'opacity-100 z-10 flex flex-col h-full' : 'opacity-0 hidden'}`}>
            <DocumentManagementTab />
          </div>

          {/* TODO List Tab View */}
          <div className={`transition-all duration-500 ${activeTab === 'todo' ? 'opacity-100 z-10 flex flex-col h-full' : 'opacity-0 hidden'}`}>
            <TodoListTab todosFutari={todosFutari} setTodosFutari={setTodosFutari} todosBeni={todosBeni} setTodosBeni={setTodosBeni} todosKou={todosKou} setTodosKou={setTodosKou} />
          </div>

          {/* Calendar Tab View */}
          <div className={`transition-all duration-500 ${activeTab === 'calendar' ? 'opacity-100 z-10 flex flex-col h-full' : 'opacity-0 hidden'}`}>
            <div className="h-full w-full max-w-7xl mx-auto p-4 md:p-6 pb-28 md:pb-6">
              <TimeTreeCalendar />
            </div>
          </div>

          {/* Settings Tab View */}
          <div className={`transition-all duration-500 ${activeTab === 'settings' ? 'opacity-100 z-10 flex flex-col h-full' : 'opacity-0 hidden'}`}>
            <div className="h-full flex flex-col items-center justify-center text-slate-500 p-6 text-center w-full max-w-7xl mx-auto">
              <div className="bg-white p-12 rounded-3xl shadow-sm border border-slate-100 max-w-md w-full">
                <div className="text-6xl mb-6">⚙️</div>
                <h2 className="text-2xl font-black text-slate-700 mb-3">設定パネル</h2>
                <p className="text-sm text-slate-500 leading-relaxed mb-6">
                  ゴミ出しの曜日設定、天気の地域設定、<br />時刻表URLの変更機能などをここに追加予定です。
                </p>
                <button className="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-6 rounded-xl transition-colors w-full">
                  設定を編集する（準備中）
                </button>
              </div>
            </div>
          </div>

          {/* Test Tab View */}
          <div className={`transition-all duration-500 ${activeTab === 'test' ? 'opacity-100 z-10 flex flex-col h-full' : 'opacity-0 hidden'}`}>
            <NextTransitWidget />
          </div>
        </AppLayout>
      );
    };

    try {
      ReactDOM.render(<App />, document.getElementById('root'));
    } catch (err) {
      console.error(err);
      const rootEl = document.getElementById('root');
      rootEl.innerHTML = '<div style="padding:20px;color:red;font-weight:bold;">システム起動エラー (iOS 12互換性エラー): ' + err.message + '</div>';
    }
  </script>
</body>

</html>
